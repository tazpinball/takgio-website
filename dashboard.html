<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TAKGIO — Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>T</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Header -->
  <header class="dash-header">
    <span class="logo">TAKGIO <span class="version-badge version-clickable" id="version-badge"></span></span>
    <nav class="dash-nav">
      <a href="/dashboard.html" class="active">Dashboard</a>
      <a href="/tasks.html">My Tasks</a>
    </nav>
    <div class="dash-user">
      <span class="dash-user-name" id="user-name"></span>
      <button class="btn-theme-toggle" id="btn-theme">Vivid</button>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </header>

  <main class="dash-content">

    <!-- Summary bar -->
    <div class="dsh-summary" id="dsh-summary">
      <div class="dsh-sum-lead">
        <div class="dsh-sum-k">Portfolio</div>
        <div class="dsh-sum-v"><span id="sum-total">—</span> projects</div>
        <div class="dsh-sum-s" id="sum-verticals">&nbsp;</div>
      </div>
      <div class="dsh-sum-figs">
        <div class="dsh-fig"><div class="n" id="sum-live">—</div><div class="l">Live</div></div>
        <div class="dsh-fig"><div class="n" id="sum-building">—</div><div class="l">Building</div></div>
        <div class="dsh-fig"><div class="n" id="sum-tasks">—</div><div class="l">Open tasks</div></div>
        <div class="dsh-fig"><div class="n crit" id="sum-quiet">—</div><div class="l">Quiet 14d+</div></div>
      </div>
    </div>

    <!-- Widgets -->
    <div class="dsh-widgets">
      <div class="dsh-card">
        <div class="dsh-card-h"><span class="dsh-card-t">Needs attention</span><span class="dsh-card-m" id="attn-count">—</span></div>
        <div id="attn-list"></div>
      </div>
      <div class="dsh-card">
        <div class="dsh-card-h"><span class="dsh-card-t">Pipeline by stage</span><span class="dsh-card-m" id="pipe-total">—</span></div>
        <div class="dsh-bars" id="pipe-bars"></div>
      </div>
      <div class="dsh-card">
        <div class="dsh-card-h"><span class="dsh-card-t">Recent activity</span><span class="dsh-card-m">latest</span></div>
        <div id="activity-list"></div>
      </div>
    </div>

    <!-- Table heading + controls -->
    <div class="dsh-table-head">
      <h2>All projects</h2>
      <span class="count" id="table-count"></span>
      <span class="sp"></span>
      <select class="filter-select" id="filter-stage">
        <option value="">All Stages</option>
        <option value="Idea">Idea</option>
        <option value="Building">Building</option>
        <option value="UAT">UAT</option>
        <option value="Live">Live</option>
        <option value="Paused">Paused</option>
        <option value="Discarded">Discarded</option>
      </select>
      <select class="filter-select" id="filter-priority">
        <option value="">All Priorities</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select class="filter-select" id="filter-sort">
        <option value="stage" selected>Stage</option>
        <option value="updated">Last Updated</option>
        <option value="priority">Priority</option>
        <option value="name">Name</option>
        <option value="created">Newest First</option>
      </select>
      <button class="btn-new-project" id="btn-new-project">+ New Project</button>
    </div>

    <!-- Projects table -->
    <div class="dsh-table" id="projects-grid">
      <div class="loading">Loading projects...</div>
    </div>

  </main>

  <!-- New Project Modal -->
  <div class="modal-overlay" id="modal-new-project" style="display:none;">
    <div class="modal">
      <h2>New Project</h2>
      <form class="modal-form" id="form-new-project">
        <div class="form-field">
          <label for="new-name">Project Name *</label>
          <input type="text" id="new-name" required placeholder="e.g. AI Tutor">
        </div>
        <div class="form-field">
          <label for="new-desc">Description</label>
          <textarea id="new-desc" placeholder="What is this project and why does it matter?"></textarea>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label for="new-stage">Stage</label>
            <select id="new-stage">
              <option value="Idea" selected>Idea</option>
              <option value="Building">Building</option>
              <option value="UAT">UAT</option>
              <option value="Live">Live</option>
              <option value="Paused">Paused</option>
              <option value="Discarded">Discarded</option>
            </select>
          </div>
          <div class="form-field">
            <label for="new-priority">Priority</label>
            <select id="new-priority">
              <option value="">—</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
        </div>
        <div class="form-row-3">
          <div class="form-field">
            <label for="new-category">Category</label>
            <input type="text" id="new-category" placeholder="e.g. Product">
          </div>
          <div class="form-field">
            <label for="new-industry">Industry</label>
            <input type="text" id="new-industry" placeholder="e.g. Construction">
          </div>
          <div class="form-field">
            <label for="new-client">Client / Contact</label>
            <input type="text" id="new-client" placeholder="e.g. ABC Corp">
          </div>
        </div>
        <div class="form-field">
          <label for="new-tech">Tech Stack (comma-separated)</label>
          <input type="text" id="new-tech" placeholder="e.g. Vercel, Supabase, LiveKit">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-modal-secondary" id="btn-cancel-new">Cancel</button>
          <button type="submit" class="btn-modal-primary">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Release Notes Modal -->
  <div class="modal-overlay" id="modal-release-notes" style="display:none;">
    <div class="modal" style="max-width:520px;">
      <h2>Release Notes</h2>
      <div id="release-notes-content"></div>
      <div class="modal-actions" style="margin-top:1rem;">
        <button type="button" class="btn-modal-secondary" id="btn-close-releases">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
