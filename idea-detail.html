<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TAKGIO — Idea Detail</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/ideas.css">
</head>
<body>

  <!-- Password Gate -->
  <div id="password-gate" class="password-gate">
    <h1>TAKGIO</h1>
    <form id="password-form" class="password-form">
      <input type="password" id="password-input" placeholder="Enter password" autocomplete="off">
      <button type="submit">Enter</button>
      <div id="password-error" class="password-error"></div>
    </form>
  </div>

  <!-- Detail App (hidden until authenticated) -->
  <div id="ideas-app" class="ideas-app">

    <header class="ideas-header">
      <h1>TAKGIO Ideas</h1>
      <div class="user-info">
        <span id="current-user"></span>
        <button id="btn-logout" class="btn-logout">Lock</button>
      </div>
    </header>

    <div class="ideas-container">
      <a href="ideas.html" class="back-link">&larr; Back to Ideas</a>

      <div id="detail-content" class="detail-content">
        <div class="ideas-empty">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- App config and logic -->
  <script src="js/supabase-config.js"></script>
  <script src="js/idea-detail.js"></script>

</body>
</html>
