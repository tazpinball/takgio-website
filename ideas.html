<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TAKGIO — Ideas</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/ideas.css">
</head>
<body>

  <!-- Password Gate -->
  <div id="password-gate" class="password-gate">
    <h1>TAKGIO</h1>
    <form id="password-form" class="password-form">
      <input type="password" id="password-input" placeholder="Enter password" autocomplete="off">
      <button type="submit">Enter</button>
      <div id="password-error" class="password-error"></div>
    </form>
  </div>

  <!-- Ideas App (hidden until authenticated) -->
  <div id="ideas-app" class="ideas-app">

    <header class="ideas-header">
      <h1>TAKGIO Ideas</h1>
      <div class="user-info">
        <span id="current-user"></span>
        <button id="btn-logout" class="btn-logout">Lock</button>
      </div>
    </header>

    <!-- Name prompt overlay -->
    <div id="name-prompt-overlay" class="name-prompt-overlay" style="display:none;">
      <div class="name-prompt">
        <h2>What's your name?</h2>
        <p>This will be shown next to ideas you add.</p>
        <form id="name-form">
          <input type="text" id="name-input" placeholder="Your name" autocomplete="off">
          <button type="submit" class="btn-primary">Continue</button>
        </form>
      </div>
    </div>

    <div class="ideas-container">

      <!-- Stage Chart -->
      <div class="chart-section">
        <h2>Ideas by Stage</h2>
        <div class="chart-wrapper">
          <canvas id="stage-chart"></canvas>
        </div>
      </div>

      <!-- Add Idea (collapsible) -->
      <div class="add-idea-section">
        <button type="button" id="toggle-add-form" class="btn-add-toggle">+ Add Idea</button>
        <div id="add-idea-panel" class="add-idea-panel" style="display:none;">
          <form id="add-idea-form" class="idea-form-compact">
            <div class="form-grid-top">
              <input type="text" id="idea-name" placeholder="Idea name *" required
                title="A short, descriptive name for the idea.">
              <textarea id="idea-description" placeholder="Description (optional)" rows="1"
                title="A brief summary of the idea."></textarea>
            </div>
            <div class="form-grid-3col">
              <select id="idea-stage" title="Pipeline stage">
                <option value="">Stage...</option>
                <option value="Draft" selected>Draft</option>
                <option value="Submitted">Submitted</option>
                <option value="Under Review">Under Review</option>
                <option value="Approved">Approved</option>
                <option value="In Progress">In Progress</option>
                <option value="Testing / Pilot">Testing / Pilot</option>
                <option value="Completed">Completed</option>
                <option value="On Hold">On Hold</option>
                <option value="Discarded">Discarded</option>
              </select>
              <select id="idea-priority" title="Priority level">
                <option value="">Priority...</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
                <option value="Critical">Critical</option>
              </select>
              <select id="idea-category" title="Category">
                <option value="">Category...</option>
                <option value="Automation">Automation</option>
                <option value="Product">Product</option>
                <option value="Service">Service</option>
                <option value="Process Improvement">Process Improvement</option>
                <option value="Other">Other</option>
              </select>
              <select id="idea-effort" title="Effort estimate">
                <option value="">Effort...</option>
                <option value="S">S — Small</option>
                <option value="M">M — Medium</option>
                <option value="L">L — Large</option>
                <option value="XL">XL — Extra Large</option>
              </select>
              <select id="idea-impact" title="Expected impact">
                <option value="">Impact...</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
              <input type="text" id="idea-client" placeholder="Client / Contact"
                title="Who is this for?">
              <input type="text" id="idea-industry" placeholder="Industry"
                title="Industry or sector">
              <input type="text" id="idea-relationship" placeholder="Relationship"
                title="How you know the client">
              <input type="text" id="idea-problem" placeholder="Problem being solved"
                title="Pain point">
              <input type="text" id="idea-solution" placeholder="Proposed solution"
                title="How to solve it">
              <input type="text" id="idea-time-savings" placeholder="Time savings"
                title="Estimated time saved">
              <input type="text" id="idea-expected-outcome" placeholder="Expected outcome"
                title="What result you expect">
              <input type="date" id="idea-target-date" title="Target date">
              <input type="url" id="idea-link" placeholder="Link / URL"
                title="Related link or resource">
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">Add Idea</button>
              <button type="button" class="btn-secondary" id="btn-cancel-add">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Ideas List (compact table) -->
      <div class="ideas-list-section">
        <h2>All Ideas <span id="ideas-count" class="ideas-count-badge"></span></h2>
        <div id="ideas-list" class="ideas-table-wrapper">
          <div class="ideas-empty">Loading...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- App config and logic -->
  <script src="js/supabase-config.js"></script>
  <script src="js/ideas.js"></script>

</body>
</html>
